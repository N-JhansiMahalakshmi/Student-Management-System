{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h1>Edit Student</h1>

    <form method="POST"
          enctype="multipart/form-data"
          class="student-form">

        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name</label>

                <input type="text"
                       name="full_name"
                       value="{{ student.full_name }}"
                       required>
            </div>

            <div class="form-group">
                <label>Roll Number</label>

                <input type="text"
                       name="roll_number"
                       value="{{ student.roll_number }}"
                       required>
            </div>

            <div class="form-group">
                <label>Email</label>

                <input type="email"
                       name="email"
                       value="{{ student.email }}"
                       required>
            </div>

            <div class="form-group">
                <label>Phone</label>

                <input type="text"
                       name="phone"
                       value="{{ student.phone }}"
                       required>
            </div>

            <div class="form-group">
                <label>Department</label>

                <input type="text"
                       name="department"
                       value="{{ student.department }}"
                       required>
            </div>

            <div class="form-group">
                <label>Course</label>

                <input type="text"
                       name="course"
                       value="{{ student.course }}"
                       required>
            </div>

            <div class="form-group">
                <label>Year</label>

                <input type="text"
                       name="year"
                       value="{{ student.year }}"
                       required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>

                <input type="date"
                       name="date_of_birth"
                       value="{{ student.date_of_birth|date:'Y-m-d' }}"
                       required>
            </div>

            <div class="form-group full-width">

                <label>Student Photo</label>

                <input type="file"
                       name="photo">

            </div>

        </div>

        <button type="submit"
                class="main-btn">
            Update Student
        </button>

    </form>

</div>

{% endblock %}
